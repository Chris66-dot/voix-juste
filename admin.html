<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voix Juste — Admin</title>
<style>
  :root{
    --ink:#1B2A4A; --ink-soft:#4A5A78; --paper:#EBEEF4; --card:#FFFFFF; --rule:#D7DDE8;
    --success:#2F7A69; --success-bg:#E6F2EE; --gold:#C4922E; --gold-bg:#FBF1DF;
    --font-body:'Public Sans','Segoe UI',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:var(--font-body); padding:24px;}
  h1{font-size:22px; margin:0 0 4px;}
  .sub{color:var(--ink-soft); font-size:13px; margin:0 0 24px; font-family:var(--font-mono);}
  .card{background:var(--card); border:1px solid var(--rule); border-radius:12px; padding:20px; max-width:900px; margin:0 auto 20px;}
  input{
    font-family:var(--font-mono); font-size:14px; border:1px solid var(--rule); border-radius:8px;
    padding:9px 12px; width:100%; max-width:340px;
  }
  button{
    font-family:var(--font-body); font-weight:600; font-size:13px; border:none; border-radius:8px;
    padding:8px 14px; cursor:pointer; background:var(--ink); color:#fff;
  }
  button:hover{background:#12203f;}
  button.secondary{background:var(--card); color:var(--ink); border:1px solid var(--rule);}
  button.danger{background:#FBEBE7; color:#C6472F; border:1px solid #C6472F;}
  table{width:100%; border-collapse:collapse; margin-top:16px; font-size:13px;}
  th,td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--rule);}
  th{font-family:var(--font-mono); color:var(--ink-soft); font-weight:500;}
  .badge{padding:3px 9px; border-radius:999px; font-size:11.5px; font-family:var(--font-mono);}
  .badge.pro{background:var(--success-bg); color:var(--success); font-weight:600;}
  .badge.free{background:var(--card); border:1px solid var(--rule); color:var(--ink-soft);}
  .error{color:#C6472F; font-size:13px; margin-top:8px;}
  .row-actions{display:flex; gap:6px;}
</style>
</head>
<body>

<h1>🔐 Voix Juste — Panneau admin</h1>
<p class="sub">// gestion des comptes utilisateurs</p>

<div class="card" id="keyCard">
  <p style="margin:0 0 10px; font-size:13.5px; color:var(--ink-soft);">Entre ta clé admin pour accéder à la liste des utilisateurs.</p>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <input type="password" id="adminKeyInput" placeholder="Clé admin">
    <button id="loadBtn">Afficher les utilisateurs</button>
  </div>
  <div class="error" id="keyError"></div>
</div>

<div class="card" id="usersCard" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
    <strong id="userCount"></strong>
    <button class="secondary" id="refreshBtn">↻ Rafraîchir</button>
  </div>
  <table>
    <thead>
      <tr><th>Email</th><th>Statut</th><th>Messages utilisés</th><th>Inscrit le</th><th>Action</th></tr>
    </thead>
    <tbody id="usersBody"></tbody>
  </table>
</div>

<script>
  const keyCard = document.getElementById('keyCard');
  const usersCard = document.getElementById('usersCard');
  const adminKeyInput = document.getElementById('adminKeyInput');
  const loadBtn = document.getElementById('loadBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const keyError = document.getElementById('keyError');
  const usersBody = document.getElementById('usersBody');
  const userCount = document.getElementById('userCount');

  let adminKey = '';

  async function loadUsers(){
    keyError.textContent = '';
    try{
      const res = await fetch('/api/admin/users', { headers: { 'x-admin-key': adminKey } });
      const data = await res.json();
      if(!res.ok){ keyError.textContent = data.error || 'Erreur.'; return; }
      renderUsers(data.users);
      keyCard.style.display = 'none';
      usersCard.style.display = 'block';
    }catch(e){
      keyError.textContent = 'Erreur réseau.';
    }
  }

  function renderUsers(users){
    userCount.textContent = users.length + ' utilisateur' + (users.length>1?'s':'');
    usersBody.innerHTML = '';
    users.forEach(u=>{
      const tr = document.createElement('tr');
      const created = u.created_at ? u.created_at.split(' ')[0] : '';
      tr.innerHTML = `
        <td>${u.email}</td>
        <td><span class="badge ${u.is_pro? 'pro':'free'}">${u.is_pro? '⭐ Pro' : 'Gratuit'}</span></td>
        <td>${u.messages_used}</td>
        <td>${created}</td>
        <td class="row-actions">
          ${u.is_pro
            ? `<button class="danger" data-email="${u.email}" data-action="downgrade">Repasser gratuit</button>`
            : `<button data-email="${u.email}" data-action="upgrade">Passer en Pro</button>`}
        </td>`;
      usersBody.appendChild(tr);
    });
  }

  usersBody.addEventListener('click', async (e)=>{
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    btn.disabled = true;
    try{
      const res = await fetch('/api/admin/' + btn.dataset.action, {
        method:'POST',
        headers: { 'Content-Type':'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ email: btn.dataset.email })
      });
      if(res.ok) loadUsers();
      else alert('Action impossible.');
    }catch(e){
      alert('Erreur réseau.');
    }finally{
      btn.disabled = false;
    }
  });

  loadBtn.addEventListener('click', ()=>{
    adminKey = adminKeyInput.value.trim();
    if(!adminKey){ keyError.textContent = 'Entre ta clé admin.'; return; }
    loadUsers();
  });
  adminKeyInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') loadBtn.click(); });
  refreshBtn.addEventListener('click', loadUsers);
</script>
</body>
</html>
